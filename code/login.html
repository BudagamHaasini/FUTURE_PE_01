<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — WorkBrew Cafe</title>
<meta name="description" content="Login to your WorkBrew Cafe account to manage bookings, memberships and productivity stats." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div class="min-h-screen grid md:grid-cols-2">
  <!-- left -->
  <div class="relative hidden md:block">
    <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=1200&q=80" alt="" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 hero-overlay"></div>
    <div class="relative p-12 h-full flex flex-col justify-between text-white">
      <a href="index.html" class="font-display text-2xl font-bold">☕ Work<span class="gradient-text">Brew</span></a>
      <div>
        <h2 class="font-display text-4xl font-bold leading-tight">Welcome back to your favorite study cafe.</h2>
        <p class="mt-3 text-white/80">Pick up right where you left off — your seat is waiting.</p>
      </div>
      <p class="text-sm text-white/60">© WorkBrew Cafe, Hyderabad</p>
    </div>
  </div>

  <!-- right form -->
  <div class="flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <div class="flex items-center justify-between">
        <a href="index.html" class="md:hidden font-display text-xl font-bold">☕ WorkBrew</a>
        <button onclick="toggleTheme()" class="ml-auto w-9 h-9 rounded-lg border" style="border-color:var(--border)"><span data-theme-icon>🌙</span></button>
      </div>
      <h1 class="font-display text-3xl font-bold mt-8">Login</h1>
      <p style="color:var(--muted)" class="mt-1">Continue to your WorkBrew dashboard.</p>

      <button class="wb-btn wb-btn-outline w-full mt-6">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29 35 26.6 36 24 36c-5.3 0-9.7-3.3-11.3-8L6 32.7C9.4 39.4 16.1 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C40 35.8 44 30.4 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
        Continue with Google
      </button>
      <div class="my-5 flex items-center gap-3 text-xs" style="color:var(--muted)"><div class="flex-1 h-px" style="background:var(--border)"></div>OR<div class="flex-1 h-px" style="background:var(--border)"></div></div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label class="text-sm font-medium">Email</label>
          <input class="wb-input mt-1" type="email" name="email" required placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-sm font-medium flex justify-between">Password <a href="#" class="text-xs" style="color:var(--brand)">Forgot password?</a></label>
          <input class="wb-input mt-1" type="password" name="password" required minlength="6" placeholder="••••••••" />
        </div>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="accent-orange-600" /> Remember me</label>
        <button class="wb-btn wb-btn-primary w-full" type="submit">Login</button>
        <p id="msg" class="text-sm text-center hidden"></p>
      </form>

      <p class="mt-6 text-sm text-center" style="color:var(--muted)">Don't have an account? <a href="signup.html" style="color:var(--brand)" class="font-semibold">Sign up</a></p>
    </div>
  </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', e=>{
  e.preventDefault();
  const f = e.target, msg=document.getElementById('msg');
  if(!f.email.value || !f.password.value){
    msg.textContent='Please fill in all fields.'; msg.className='text-sm text-center text-red-600'; return;
  }
  msg.textContent='✓ Logged in (demo). Redirecting…'; msg.className='text-sm text-center text-green-600';
  setTimeout(()=>location.href='booking.html', 900);
});
</script>
<script src="assets/js/main.js"></script>
</body></html>
