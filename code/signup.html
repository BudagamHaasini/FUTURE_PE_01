<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up — WorkBrew Cafe</title>
<meta name="description" content="Create your WorkBrew Cafe account to book study slots, access memberships, and join Hyderabad's most productive community." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div class="min-h-screen grid md:grid-cols-2">
  <div class="relative hidden md:block">
    <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=1200&q=80" alt="" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 hero-overlay"></div>
    <div class="relative p-12 h-full flex flex-col justify-between text-white">
      <a href="index.html" class="font-display text-2xl font-bold">☕ Work<span class="gradient-text">Brew</span></a>
      <div>
        <h2 class="font-display text-4xl font-bold leading-tight">Join Hyderabad's most productive cafe.</h2>
        <p class="mt-3 text-white/80">Sign up to book seats, track focus hours and unlock student perks.</p>
      </div>
      <p class="text-sm text-white/60">© WorkBrew Cafe</p>
    </div>
  </div>

  <div class="flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <button onclick="toggleTheme()" class="ml-auto block w-9 h-9 rounded-lg border" style="border-color:var(--border)"><span data-theme-icon>🌙</span></button>
      <h1 class="font-display text-3xl font-bold mt-4">Create your account</h1>
      <p style="color:var(--muted)" class="mt-1">Takes less than a minute. No credit card.</p>

      <form id="su-form" class="space-y-4 mt-6" novalidate>
        <div><label class="text-sm font-medium">Full name</label><input class="wb-input mt-1" name="name" required placeholder="Aarav Sharma" /></div>
        <div><label class="text-sm font-medium">Email</label><input class="wb-input mt-1" name="email" type="email" required placeholder="you@example.com" /></div>
        <div>
          <label class="text-sm font-medium">Password</label>
          <input class="wb-input mt-1" name="pw" id="pw" type="password" required minlength="6" placeholder="At least 6 characters" />
          <div class="mt-2 h-1.5 rounded-full overflow-hidden" style="background:var(--border)"><div id="bar" class="h-full transition-all" style="width:0%;background:var(--danger)"></div></div>
          <p id="strength" class="text-xs mt-1" style="color:var(--muted)">Strength: —</p>
        </div>
        <div><label class="text-sm font-medium">Confirm password</label><input class="wb-input mt-1" id="cpw" name="cpw" type="password" required placeholder="Re-enter password" /></div>
        <p id="err" class="text-sm text-red-600 hidden"></p>
        <p id="ok"  class="text-sm text-green-600 hidden"></p>
        <button class="wb-btn wb-btn-primary w-full" type="submit">Create Account</button>
      </form>
      <p class="mt-6 text-sm text-center" style="color:var(--muted)">Already a member? <a href="login.html" style="color:var(--brand)" class="font-semibold">Login</a></p>
    </div>
  </div>
</div>
<script>
const pw=document.getElementById('pw'), bar=document.getElementById('bar'), st=document.getElementById('strength');
pw.addEventListener('input', ()=>{
  const v=pw.value; let s=0;
  if(v.length>=6)s++; if(/[A-Z]/.test(v))s++; if(/\d/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  const map=[{w:'10%',c:'#dc2626',t:'Very weak'},{w:'30%',c:'#dc2626',t:'Weak'},{w:'55%',c:'#eab308',t:'Fair'},{w:'80%',c:'#16a34a',t:'Strong'},{w:'100%',c:'#16a34a',t:'Excellent'}];
  bar.style.width=map[s].w; bar.style.background=map[s].c; st.textContent='Strength: '+map[s].t;
});
document.getElementById('su-form').addEventListener('submit',e=>{
  e.preventDefault();
  const f=e.target, err=document.getElementById('err'), ok=document.getElementById('ok');
  err.classList.add('hidden'); ok.classList.add('hidden');
  if(!f.name.value || !f.email.value || !f.pw.value){ err.textContent='All fields are required.'; err.classList.remove('hidden'); return; }
  if(f.pw.value.length<6){ err.textContent='Password must be at least 6 characters.'; err.classList.remove('hidden'); return; }
  if(f.pw.value!==f.cpw.value){ err.textContent='Passwords do not match.'; err.classList.remove('hidden'); return; }
  ok.textContent='✓ Account created! Redirecting…'; ok.classList.remove('hidden');
  setTimeout(()=>location.href='booking.html', 900);
});
</script>
<script src="assets/js/main.js"></script>
</body></html>
