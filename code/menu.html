<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu — WorkBrew Cafe Hyderabad | Coffee, Food & Desserts</title>
<meta name="description" content="Explore WorkBrew Cafe's full menu — espresso, cappuccino, lattes, pizzas, burgers, sandwiches, cakes, donuts & brownies in Hyderabad." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<header class="sticky top-0 z-50 backdrop-blur-lg" style="background: color-mix(in oklab, var(--bg) 80%, transparent); border-bottom:1px solid var(--border);">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 font-display text-xl font-bold"><span class="w-9 h-9 rounded-xl flex items-center justify-center text-white" style="background:linear-gradient(135deg,var(--brand),var(--brand-2))">☕</span>Work<span class="gradient-text">Brew</span></a>
    <nav class="hidden md:flex items-center gap-7 text-sm font-medium">
      <a href="index.html" class="nav-link">Home</a><a href="services.html" class="nav-link">Services</a><a href="menu.html" class="nav-link">Menu</a><a href="booking.html" class="nav-link">Book Slot</a><a href="productivity.html" class="nav-link">Productivity Wall</a><a href="contact.html" class="nav-link">Contact</a>
    </nav>
    <div class="flex items-center gap-3">
      <button onclick="toggleTheme()" class="w-9 h-9 rounded-lg border" style="border-color:var(--border)"><span data-theme-icon>🌙</span></button>
      <a href="login.html" class="hidden sm:inline-flex wb-btn wb-btn-outline !py-2 !px-4 text-sm">Login</a>
      <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
    </div>
  </div>
  <div id="mobile-menu" class="hidden md:hidden border-t px-6 py-4 space-y-3" style="border-color:var(--border)">
    <a href="index.html" class="block">Home</a><a href="services.html" class="block">Services</a><a href="menu.html" class="block">Menu</a><a href="booking.html" class="block">Book Slot</a><a href="productivity.html" class="block">Productivity Wall</a><a href="contact.html" class="block">Contact</a>
  </div>
</header>

<section class="py-16 px-6 text-center">
  <span class="badge badge-yellow">Menu</span>
  <h1 class="font-display text-5xl md:text-6xl font-bold mt-3">Fuel for <span class="gradient-text">focus</span>.</h1>
  <p class="mt-4" style="color:var(--muted)">Hand-crafted coffee, oven-fresh food, sweet rewards.</p>
</section>

<section class="px-6 pb-8 max-w-7xl mx-auto">
  <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
    <div id="cat-filter" class="flex flex-wrap gap-2">
      <button class="wb-btn wb-btn-primary !py-2 !px-4 text-sm" data-cat="all">All</button>
      <button class="wb-btn wb-btn-outline !py-2 !px-4 text-sm" data-cat="coffee">Coffee</button>
      <button class="wb-btn wb-btn-outline !py-2 !px-4 text-sm" data-cat="food">Food</button>
      <button class="wb-btn wb-btn-outline !py-2 !px-4 text-sm" data-cat="desserts">Desserts</button>
    </div>
    <input id="menu-search" type="search" placeholder="Search the menu…" class="wb-input md:w-72" />
  </div>
</section>

<section class="px-6 pb-24 max-w-7xl mx-auto">
  <div id="menu-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  <p id="empty" class="text-center mt-10 hidden" style="color:var(--muted)">No items match your search.</p>
</section>

<script>
const items = [
  {name:'Espresso', cat:'coffee', price:120, img:'https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80', desc:'Bold double shot of single-origin Arabica.'},
  {name:'Cappuccino', cat:'coffee', price:160, img:'https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=600&q=80', desc:'Velvety steamed milk over espresso.'},
  {name:'Café Latte', cat:'coffee', price:170, img:'https://images.unsplash.com/photo-1561882468-9110e03e0f78?w=600&q=80', desc:'Smooth latte with silky micro-foam.'},
  {name:'Cold Brew', cat:'coffee', price:180, img:'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=600&q=80', desc:'18-hour steeped, served over ice.'},
  {name:'Masala Chai', cat:'coffee', price:90, img:'https://images.unsplash.com/photo-1597318236692-c5a14a4cdc7c?w=600&q=80', desc:'Classic spiced Indian chai.'},
  {name:'Margherita Pizza', cat:'food', price:299, img:'https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=600&q=80', desc:'Stone-baked with fresh basil & mozzarella.'},
  {name:'Pepperoni Pizza', cat:'food', price:399, img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80', desc:'Loaded with spicy pepperoni.'},
  {name:'Classic Burger', cat:'food', price:259, img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80', desc:'Juicy patty, cheddar, brioche bun.'},
  {name:'Grilled Sandwich', cat:'food', price:199, img:'https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=600&q=80', desc:'Triple-decker with cheese & veggies.'},
  {name:'Chocolate Brownie', cat:'desserts', price:149, img:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600&q=80', desc:'Warm gooey brownie with ice cream.'},
  {name:'Glazed Donut', cat:'desserts', price:99, img:'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600&q=80', desc:'Pillowy donut, classic glaze.'},
  {name:'Red Velvet Cake', cat:'desserts', price:199, img:'https://images.unsplash.com/photo-1586788680434-30d324b2d46f?w=600&q=80', desc:'Moist slice with cream-cheese frosting.'},
];
const grid = document.getElementById('menu-grid');
const empty = document.getElementById('empty');
let active = 'all', query = '';
function render() {
  const filtered = items.filter(i => (active==='all'||i.cat===active) && i.name.toLowerCase().includes(query));
  grid.innerHTML = filtered.map(i => `
    <article class="wb-card overflow-hidden">
      <img src="${i.img}" alt="${i.name}" class="h-44 w-full object-cover" loading="lazy" />
      <div class="p-5">
        <div class="flex items-center justify-between">
          <h3 class="font-display text-xl font-bold">${i.name}</h3>
          <span class="font-bold">₹${i.price}</span>
        </div>
        <p class="mt-2 text-sm" style="color:var(--muted)">${i.desc}</p>
        <button class="wb-btn wb-btn-outline w-full mt-4 text-sm">Add to Order</button>
      </div>
    </article>`).join('');
  empty.classList.toggle('hidden', filtered.length>0);
}
document.getElementById('cat-filter').addEventListener('click', e=>{
  const b = e.target.closest('button[data-cat]'); if(!b) return;
  active = b.dataset.cat;
  document.querySelectorAll('#cat-filter button').forEach(x=>{
    x.classList.remove('wb-btn-primary'); x.classList.add('wb-btn-outline');
  });
  b.classList.remove('wb-btn-outline'); b.classList.add('wb-btn-primary');
  render();
});
document.getElementById('menu-search').addEventListener('input', e=>{ query=e.target.value.toLowerCase(); render(); });
render();
</script>

<footer class="px-6 pt-16 pb-10" style="background:#0f0d0b;color:#e8dfd0">
  <div class="max-w-7xl mx-auto text-center text-sm text-white/60">© <span id="year"></span> WorkBrew Cafe</div>
</footer>
<script src="assets/js/main.js"></script>
</body></html>
